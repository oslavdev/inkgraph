name: 'Mark stale issues and PRs'
on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v4
        with:
          days-before-stale: 14
          days-before-close: -1
          stale-pr-label: stale
